<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StoryVerse - Login</title>
  
  <!-- Google Fonts for English and Bangla Support -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* Theme Variables */
    :root {
      --bg-gradient-dark: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #020617 100%);
      --bg-gradient-light: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 50%, #f1f5f9 100%);
      
      --glass-bg-dark: rgba(255, 255, 255, 0.03);
      --glass-bg-light: rgba(15, 23, 42, 0.02);
      
      --glass-border-dark: rgba(255, 255, 255, 0.08);
      --glass-border-light: rgba(15, 23, 42, 0.08);
      
      --text-primary-dark: #f8fafc;
      --text-primary-light: #0f172a;
      
      --text-secondary-dark: #94a3b8;
      --text-secondary-light: #475569;
      
      --primary-color: #6366f1;
      --primary-hover: #4f46e5;
      --accent-color: #f43f5e;
      --success-color: #10b981;
      
      --font-family: 'Poppins', 'Hind Siliguri', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: var(--font-family);
      transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
    }

    body {
      background: var(--bg-gradient-dark);
      color: var(--text-primary-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body.light-mode {
      background: var(--bg-gradient-light);
      color: var(--text-primary-light);
    }

    /* Loader Overlay */
    .global-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    body.light-mode .global-loader {
      background: #f8fafc;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(99, 102, 241, 0.2);
      border-top: 5px solid var(--primary-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Header Nav */
    .navbar {
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: var(--glass-bg-dark);
      border-bottom: 1px solid var(--glass-border-dark);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    body.light-mode .navbar {
      background: var(--glass-bg-light);
      border-bottom: 1px solid var(--glass-border-light);
    }

    .nav-logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary-color);
      text-decoration: none;
      background: linear-gradient(to right, #6366f1, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .control-icon {
      background: var(--glass-bg-dark);
      border: 1px solid var(--glass-border-dark);
      color: var(--text-primary-dark);
      padding: 0.5rem;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }
    body.light-mode .control-icon {
      background: var(--glass-bg-light);
      border-color: var(--glass-border-light);
      color: var(--text-primary-light);
    }

    /* Auth Wrapper Page Center */
    .auth-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .auth-card {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--glass-border-dark);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      transform: translateY(0);
      animation: floatUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    body.light-mode .auth-card {
      background: rgba(15, 23, 42, 0.01);
      border-color: var(--glass-border-light);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
    }

    @keyframes floatUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .auth-title {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .auth-subtitle {
      font-size: 0.9rem;
      color: var(--text-secondary-dark);
      margin-bottom: 2rem;
      text-align: center;
    }
    body.light-mode .auth-subtitle {
      color: var(--text-secondary-light);
    }

    /* Forms */
    .form-group {
      margin-bottom: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-label {
      font-size: 0.85rem;
      font-weight: 500;
    }

    .input-field {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--glass-border-dark);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary-dark);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    body.light-mode .input-field {
      border-color: var(--glass-border-light);
      background: rgba(0, 0, 0, 0.02);
      color: var(--text-primary-light);
    }

    .input-field:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    /* Actions inside form */
    .form-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
    }

    .checkbox-container {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
    }

    .checkbox-input {
      accent-color: var(--primary-color);
      cursor: pointer;
    }

    .forgot-link {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
    }
    .forgot-link:hover {
      text-decoration: underline;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      border: none;
      outline: none;
      font-size: 0.95rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }
    .btn:active {
      transform: scale(0.97);
    }
    .btn-primary {
      background: var(--primary-color);
      color: #fff;
    }
    .btn-primary:hover {
      background: var(--primary-hover);
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    }

    /* Feedback states */
    .error-banner {
      background: rgba(244, 63, 94, 0.1);
      border: 1px solid rgba(244, 63, 94, 0.3);
      color: var(--accent-color);
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      display: none;
    }

    /* Secondary Navigation Links */
    .switch-auth-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: var(--text-secondary-dark);
    }
    body.light-mode .switch-auth-link {
      color: var(--text-secondary-light);
    }
    .switch-auth-link a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 600;
    }
    .switch-auth-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- Loading Animation Overlay -->
  <div class="global-loader" id="loader">
    <div class="spinner"></div>
  </div>

  <header class="navbar">
    <a href="index.html" class="nav-logo">StoryVerse</a>
    <div class="nav-actions">
      <button class="control-icon" id="btn-lang" title="Switch Language">EN</button>
      <button class="control-icon" id="btn-theme" title="Toggle Theme">🌙</button>
    </div>
  </header>

  <div class="auth-container">
    <div class="auth-card">
      <h2 class="auth-title" id="txt-login-title">Welcome Back</h2>
      <p class="auth-subtitle" id="txt-login-subtitle">Sign in to your account to continue reading and writing stories.</p>
      
      <!-- Error Feedback Display Area -->
      <div class="error-banner" id="error-message">Error messaging placeholder</div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="login-email" id="lbl-email">Email Address</label>
          <input class="input-field" type="email" id="login-email" required placeholder="name@domain.com">
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password" id="lbl-password">Password</label>
          <input class="input-field" type="password" id="login-password" required placeholder="••••••••">
        </div>

        <div class="form-actions">
          <label class="checkbox-container">
            <input type="checkbox" class="checkbox-input" id="remember-me">
            <span id="lbl-remember">Remember Me</span>
          </label>
          <a href="forgot-password.html" class="forgot-link" id="lnk-forgot">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary" id="btn-submit">Login</button>
      </form>

      <div class="switch-auth-link">
        <span id="txt-need-account">New to StoryVerse?</span>
        <a href="register.html" id="lnk-create">Create Account</a>
      </div>
    </div>
  </div>

  <!-- Firebase Integration script modules -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Firebase configuration placeholder
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      databaseURL: "YOUR_DATABASE_URL",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Multilingual support configuration values
    const translations = {
      EN: {
        loginTitle: "Welcome Back",
        loginSubtitle: "Sign in to your account to continue reading and writing stories.",
        lblEmail: "Email Address",
        lblPassword: "Password",
        lblRemember: "Remember Me",
        lnkForgot: "Forgot Password?",
        btnSubmit: "Login",
        btnLoading: "Logging in...",
        txtNeedAccount: "New to StoryVerse? ",
        lnkCreate: "Create Account",
        errWrongPassword: "The password you entered is incorrect.",
        errUserNotFound: "No account matches this email address.",
        errInvalidEmail: "The format of this email is not valid.",
        errNetwork: "A network error occurred. Please verify your connection.",
        errGeneric: "An unexpected issue occurred. Please try again."
      },
      BN: {
        loginTitle: "আপনাকে পুনরায় স্বাগতম",
        loginSubtitle: "গল্প পড়া এবং লেখা চালিয়ে যেতে আপনার অ্যাকাউন্টে সাইন ইন করুন।",
        lblEmail: "ইমেল ঠিকানা",
        lblPassword: "পাসওয়ার্ড",
        lblRemember: "মনে রাখুন",
        lnkForgot: "পাসওয়ার্ড ভুলে গেছেন?",
        btnSubmit: "লগইন",
        btnLoading: "প্রবেশ করা হচ্ছে...",
        txtNeedAccount: "স্টোরিভার্সে নতুন? ",
        lnkCreate: "অ্যাকাউন্ট তৈরি করুন",
        errWrongPassword: "আপনার প্রদান করা পাসওয়ার্ডটি সঠিক নয়।",
        errUserNotFound: "এই ইমেলের সাথে কোনো অ্যাকাউন্টের মিল পাওয়া যায়নি।",
        errInvalidEmail: "ইমেল ঠিকানাটির ফরম্যাট সঠিক নয়।",
        errNetwork: "নেটওয়ার্ক ত্রুটি ঘটেছে। আপনার ইন্টারনেট সংযোগ পরীক্ষা করুন।",
        errGeneric: "একটি অপ্রত্যাশিত সমস্যা ঘটেছে। আবার চেষ্টা করুন।"
      }
    };

    let currentLang = localStorage.getItem("lang") || "EN";
    let currentTheme = localStorage.getItem("theme") || "dark";

    const loader = document.getElementById("loader");
    const themeBtn = document.getElementById("btn-theme");
    const langBtn = document.getElementById("btn-lang");
    const loginForm = document.getElementById("login-form");
    const errorBanner = document.getElementById("error-message");

    // Initialize View configurations
    applyTheme(currentTheme);
    applyLanguage(currentLang);

    // Stop and hide loading spinner
    window.addEventListener("load", () => {
      setTimeout(() => {
        loader.style.opacity = "0";
        setTimeout(() => loader.style.display = "none", 500);
      }, 300);
    });

    // Theme Switch action listener
    themeBtn.addEventListener("click", () => {
      currentTheme = currentTheme === "dark" ? "light" : "dark";
      applyTheme(currentTheme);
    });

    function applyTheme(theme) {
      if (theme === "light") {
        document.body.classList.add("light-mode");
        themeBtn.textContent = "☀️";
      } else {
        document.body.classList.remove("light-mode");
        themeBtn.textContent = "🌙";
      }
      localStorage.setItem("theme", theme);
    }

    // Language Toggle interface updates
    langBtn.addEventListener("click", () => {
      currentLang = currentLang === "EN" ? "BN" : "EN";
      applyLanguage(currentLang);
    });

    function applyLanguage(lang) {
      const data = translations[lang];
      langBtn.textContent = lang;
      
      document.getElementById("txt-login-title").textContent = data.loginTitle;
      document.getElementById("txt-login-subtitle").textContent = data.loginSubtitle;
      document.getElementById("lbl-email").textContent = data.lblEmail;
      document.getElementById("lbl-password").textContent = data.lblPassword;
      document.getElementById("lbl-remember").textContent = data.lblRemember;
      document.getElementById("lnk-forgot").textContent = data.lnkForgot;
      document.getElementById("btn-submit").textContent = data.btnSubmit;
      document.getElementById("txt-need-account").textContent = data.txtNeedAccount;
      document.getElementById("lnk-create").textContent = data.lnkCreate;

      localStorage.setItem("lang", lang);
    }

    // Authentication form handler
    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;
      const rememberMe = document.getElementById("remember-me").checked;
      const submitBtn = document.getElementById("btn-submit");

      // Update submit element visual loader status
      submitBtn.disabled = true;
      submitBtn.textContent = translations[currentLang].btnLoading;
      errorBanner.style.display = "none";

      try {
        // Handle persistent login states based on Remember Me checkbox status
        const persistenceType = rememberMe ? browserLocalPersistence : browserSessionPersistence;
        await setPersistence(auth, persistenceType);
        
        // Execute Authentication credentials call
        await signInWithEmailAndPassword(auth, email, password);
        
        // Redirect on validated transaction status
        window.location.href = "home.html";

      } catch (error) {
        console.error("Auth error details: ", error.code, error.message);
        displayAuthError(error.code);
        
        // Reset submit button state
        submitBtn.disabled = false;
        submitBtn.textContent = translations[currentLang].btnSubmit;
      }
    });

    // Match code to local languages values
    function displayAuthError(code) {
      const data = translations[currentLang];
      let displayMessage = data.errGeneric;

      switch (code) {
        case "auth/wrong-password":
        case "auth/invalid-credential":
          displayMessage = data.errWrongPassword;
          break;
        case "auth/user-not-found":
          displayMessage = data.errUserNotFound;
          break;
        case "auth/invalid-email":
          displayMessage = data.errInvalidEmail;
          break;
        case "auth/network-request-failed":
          displayMessage = data.errNetwork;
          break;
      }

      errorBanner.textContent = displayMessage;
      errorBanner.style.display = "block";
    }
  </script>
</body>
</html>
