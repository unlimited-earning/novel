<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StoryVerse - Reset Password</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* Premium Visual Variables */
    :root {
      --bg-dark: #03001e;
      --bg-light: #f5f7fb;
      
      --accent-primary: #736efe;
      --accent-secondary: #5f85ff;
      --accent-tertiary: #ec4899;
      --success-color: #10b981;
      
      --glass-bg-dark: rgba(255, 255, 255, 0.02);
      --glass-bg-light: rgba(15, 23, 42, 0.02);
      
      --glass-border-dark: rgba(255, 255, 255, 0.08);
      --glass-border-light: rgba(15, 23, 42, 0.08);
      
      --text-primary-dark: #f8fafc;
      --text-primary-light: #0f172a;
      
      --text-secondary-dark: #94a3b8;
      --text-secondary-light: #475569;
      
      --font-classic: 'Playfair Display', serif;
      --font-modern: 'Plus Jakarta Sans', sans-serif;
      --font-bangla: 'Hind Siliguri', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: var(--font-modern);
      transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1), 
                  border-color 0.5s cubic-bezier(0.4, 0, 0.2, 1), 
                  color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Ambient animated mesh background */
    body {
      background-color: var(--bg-dark);
      color: var(--text-primary-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      position: relative;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: 
        radial-gradient(circle at 15% 15%, rgba(115, 110, 254, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 85% 85%, rgba(236, 72, 153, 0.1) 0%, transparent 40%);
      pointer-events: none;
      z-index: -1;
      animation: drift 15s ease infinite alternate;
    }

    body.light-mode {
      background-color: var(--bg-light);
      color: var(--text-primary-light);
    }

    body.light-mode::before {
      background: 
        radial-gradient(circle at 15% 15%, rgba(115, 110, 254, 0.06) 0%, transparent 45%),
        radial-gradient(circle at 85% 85%, rgba(236, 72, 153, 0.04) 0%, transparent 45%);
    }

    @keyframes drift {
      0% { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.1) translate(2%, 2%); }
    }

    /* Global Loader */
    .global-loader {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #03001e;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    body.light-mode .global-loader {
      background: #f5f7fb;
    }
    
    .spinner-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .spinner-classic {
      position: relative;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--accent-primary);
      animation: spinClassic 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }

    .spinner-classic::before {
      content: '';
      position: absolute;
      top: 4px; left: 4px; right: 4px; bottom: 4px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--accent-tertiary);
      animation: spinClassic 1.8s linear infinite reverse;
    }

    @keyframes spinClassic {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Navigation Bar */
    .navbar {
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      background: rgba(3, 0, 30, 0.6);
      border-bottom: 1px solid var(--glass-border-dark);
      padding: 1.25rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    body.light-mode .navbar {
      background: rgba(245, 247, 251, 0.6);
      border-bottom: 1px solid var(--glass-border-light);
    }

    .nav-logo {
      font-family: var(--font-classic);
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-decoration: none;
      background: linear-gradient(135deg, #736efe 0%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }

    .control-icon {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text-primary-dark);
      padding: 0.65rem;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }
    body.light-mode .control-icon {
      background: rgba(15, 23, 42, 0.02);
      border-color: rgba(15, 23, 42, 0.08);
      color: var(--text-primary-light);
    }
    .control-icon:hover {
      transform: scale(1.1) rotate(15deg);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
    }

    /* Centered Container */
    .auth-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .auth-card {
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.02) 0%, rgba(255, 255, 255, 0.01) 100%);
      border: 1px solid var(--glass-border-dark);
      border-radius: 24px;
      padding: 3rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 40px rgba(3, 0, 30, 0.5);
      animation: floatUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      position: relative;
    }
    body.light-mode .auth-card {
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.01) 0%, rgba(15, 23, 42, 0.005) 100%);
      border-color: var(--glass-border-light);
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.05);
    }

    @keyframes floatUp {
      from {
        opacity: 0;
        transform: translateY(25px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .auth-title {
      font-family: var(--font-classic);
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      text-align: center;
    }

    .auth-subtitle {
      font-size: 0.9rem;
      color: var(--text-secondary-dark);
      margin-bottom: 2.5rem;
      text-align: center;
      line-height: 1.6;
    }
    body.light-mode .auth-subtitle {
      color: var(--text-secondary-light);
    }

    /* Form Fields */
    .form-group {
      margin-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-label {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-secondary-dark);
    }
    body.light-mode .form-label {
      color: var(--text-secondary-light);
    }

    .input-field {
      width: 100%;
      padding: 0.9rem 1.25rem;
      border-radius: 12px;
      border: 1px solid var(--glass-border-dark);
      background: rgba(255, 255, 255, 0.02);
      color: var(--text-primary-dark);
      font-size: 0.95rem;
      outline: none;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    body.light-mode .input-field {
      border-color: var(--glass-border-light);
      background: rgba(0, 0, 0, 0.01);
      color: var(--text-primary-light);
      box-shadow: inset 0 1px 1px rgba(0, 0, 0, 0.01);
    }

    .input-field:focus {
      border-color: var(--accent-primary);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 0 4px rgba(115, 110, 254, 0.15);
    }

    /* Banners for feedback state */
    .feedback-banner {
      padding: 0.9rem;
      border-radius: 12px;
      font-size: 0.85rem;
      margin-bottom: 2rem;
      line-height: 1.5;
      display: none;
    }
    .feedback-banner.error {
      background: rgba(244, 63, 94, 0.06);
      border: 1px solid rgba(244, 63, 94, 0.2);
      color: var(--accent-tertiary);
      display: block;
    }
    .feedback-banner.success {
      background: rgba(16, 185, 129, 0.06);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: var(--success-color);
      display: block;
    }

    /* Action Buttons */
    .btn {
      width: 100%;
      padding: 0.9rem 1.5rem;
      border-radius: 40px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      border: none;
      outline: none;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }
    .btn:active {
      transform: scale(0.98);
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
      color: #fff;
      box-shadow: 0 4px 15px rgba(115, 110, 254, 0.25);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(115, 110, 254, 0.4);
    }
    .btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transform: skewX(-20deg);
      transition: left 0.6s ease;
    }
    .btn:hover::after {
      left: 100%;
    }

    .switch-auth-link {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.9rem;
      color: var(--text-secondary-dark);
    }
    body.light-mode .switch-auth-link {
      color: var(--text-secondary-light);
    }
    .switch-auth-link a {
      color: var(--accent-primary);
      text-decoration: none;
      font-weight: 700;
    }
    .switch-auth-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- Loading Overlay -->
  <div class="global-loader" id="loader">
    <div class="spinner-box">
      <div class="spinner-classic"></div>
      <div class="loader-logo">StoryVerse</div>
    </div>
  </div>

  <header class="navbar">
    <a href="index.html" class="nav-logo">StoryVerse</a>
    <div class="nav-actions">
      <button class="control-icon" id="btn-lang" title="Switch Language">EN</button>
      <button class="control-icon" id="btn-theme" title="Toggle Theme">🌙</button>
    </div>
  </header>

  <div class="auth-container">
    <div class="auth-card">
      <h2 class="auth-title" id="txt-reset-title">Reset Password</h2>
      <p class="auth-subtitle" id="txt-reset-subtitle">Enter your registered email address below, and we will send you instruction steps to restore your access.</p>
      
      <!-- Action Feedback Messaging Area -->
      <div class="feedback-banner" id="feedback-message">Feedback Message Placeholder</div>

      <form id="forgot-form">
        <div class="form-group">
          <label class="form-label" for="reset-email" id="lbl-email">Email Address</label>
          <input class="input-field" type="email" id="reset-email" required placeholder="name@domain.com">
        </div>

        <button type="submit" class="btn btn-primary" id="btn-submit">Send Reset Link</button>
      </form>

      <div class="switch-auth-link">
        <span id="txt-back">Remember your details?</span>
        <a href="login.html" id="lnk-login">Back to Login</a>
      </div>
    </div>
  </div>

  <!-- Firebase Setup modules -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Active client configurations
    const firebaseConfig = {
      apiKey: "AIzaSyAbPWMaCVnM5lXfoMtW1fZ9LZBH_68pxC0",
      authDomain: "novel-4d99f.firebaseapp.com",
      databaseURL: "https://novel-4d99f-default-rtdb.firebaseio.com",
      projectId: "novel-4d99f",
      storageBucket: "novel-4d99f.firebasestorage.app",
      messagingSenderId: "1005421601486",
      appId: "1:1005421601486:web:53865833ac47cc3567669f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const translations = {
      EN: {
        resetTitle: "Reset Password",
        resetSubtitle: "Enter your registered email address below, and we will send you instruction steps to restore your access.",
        lblEmail: "Email Address",
        btnSubmit: "Send Reset Link",
        btnLoading: "Sending code...",
        txtBack: "Remember your details? ",
        lnkLogin: "Back to Login",
        successMessage: "A verification email has been sent. Please check your inbox.",
        errUserNotFound: "No account matches this email address.",
        errInvalidEmail: "Please provide a valid email format.",
        errNetwork: "Network communication error. Verify your status.",
        errGeneric: "An unforeseen error occurred. Please try again."
      },
      BN: {
        resetTitle: "পাসওয়ার্ড রিসেট করুন",
        resetSubtitle: "নিচে আপনার নিবন্ধিত ইমেল ঠিকানা লিখুন, এবং আমরা আপনাকে পুনরায় অ্যাকাউন্ট পুনরুদ্ধারের নির্দেশিকা পাঠাবো।",
        lblEmail: "ইমেল ঠিকানা",
        btnSubmit: "রিসেট লিঙ্ক পাঠান",
        btnLoading: "পাঠানো হচ্ছে...",
        txtBack: "পাসওয়ার্ড মনে পড়েছে? ",
        lnkLogin: "লগইনে ফিরে যান",
        successMessage: "একটি পাসওয়ার্ড রিসেট ইমেল পাঠানো হয়েছে। অনুগ্রহ করে আপনার ইনবক্স চেক করুন।",
        errUserNotFound: "এই ইমেল ঠিকানার অধীনে কোনো অ্যাকাউন্ট পাওয়া যায়নি।",
        errInvalidEmail: "অনুগ্রহ করে একটি সঠিক ইমেল প্রদান করুন।",
        errNetwork: "নেটওয়ার্ক সংযোগের সমস্যা। পুনরায় পরীক্ষা করুন।",
        errGeneric: "একটি অপ্রত্যাশিত সমস্যা ঘটেছে। আবার চেষ্টা করুন।"
      }
    };

    let currentLang = localStorage.getItem("lang") || "EN";
    let currentTheme = localStorage.getItem("theme") || "dark";

    const loader = document.getElementById("loader");
    const themeBtn = document.getElementById("btn-theme");
    const langBtn = document.getElementById("btn-lang");
    const forgotForm = document.getElementById("forgot-form");
    const feedbackBanner = document.getElementById("feedback-message");

    applyTheme(currentTheme);
    applyLanguage(currentLang);

    window.addEventListener("load", () => {
      setTimeout(() => {
        loader.style.opacity = "0";
        setTimeout(() => loader.style.display = "none", 800);
      }, 500);
    });

    themeBtn.addEventListener("click", () => {
      currentTheme = currentTheme === "dark" ? "light" : "dark";
      applyTheme(currentTheme);
    });

    function applyTheme(theme) {
      if (theme === "light") {
        document.body.classList.add("light-mode");
        themeBtn.textContent = "☀️";
      } else {
        document.body.classList.remove("light-mode");
        themeBtn.textContent = "🌙";
      }
      localStorage.setItem("theme", theme);
    }

    langBtn.addEventListener("click", () => {
      currentLang = currentLang === "EN" ? "BN" : "EN";
      applyLanguage(currentLang);
    });

    function applyLanguage(lang) {
      const data = translations[lang];
      langBtn.textContent = lang;

      document.getElementById("txt-reset-title").textContent = data.resetTitle;
      document.getElementById("txt-reset-subtitle").textContent = data.resetSubtitle;
      document.getElementById("lbl-email").textContent = data.lblEmail;
      document.getElementById("btn-submit").textContent = data.btnSubmit;
      document.getElementById("txt-back").textContent = data.txtBack;
      document.getElementById("lnk-login").textContent = data.lnkLogin;

      localStorage.setItem("lang", lang);
    }

    forgotForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const email = document.getElementById("reset-email").value.trim();
      const submitBtn = document.getElementById("btn-submit");

      submitBtn.disabled = true;
      submitBtn.textContent = translations[currentLang].btnLoading;
      feedbackBanner.className = "feedback-banner";
      feedbackBanner.style.display = "none";

      try {
        await sendPasswordResetEmail(auth, email);

        feedbackBanner.textContent = translations[currentLang].successMessage;
        feedbackBanner.classList.add("success");
        submitBtn.disabled = false;
        submitBtn.textContent = translations[currentLang].btnSubmit;
        document.getElementById("reset-email").value = "";

      } catch (error) {
        console.error("Password reset error details:", error);
        displayResetError(error.code);
        submitBtn.disabled = false;
        submitBtn.textContent = translations[currentLang].btnSubmit;
      }
    });

    function displayResetError(code) {
      const data = translations[currentLang];
      let displayMessage = data.errGeneric;

      switch (code) {
        case "auth/user-not-found":
          displayMessage = data.errUserNotFound;
          break;
        case "auth/invalid-email":
          displayMessage = data.errInvalidEmail;
          break;
        case "auth/network-request-failed":
          displayMessage = data.errNetwork;
          break;
      }

      feedbackBanner.textContent = displayMessage;
      feedbackBanner.classList.add("error");
    }
  </script>
</body>
</html>
