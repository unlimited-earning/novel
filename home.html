<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StoryVerse - Home Feed</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* Premium Visual Variables */
    :root {
      --bg-dark: #03001e;
      --bg-light: #f5f7fb;
      
      --accent-primary: #736efe;
      --accent-secondary: #5f85ff;
      --accent-tertiary: #ec4899;
      
      --glass-bg-dark: rgba(255, 255, 255, 0.02);
      --glass-bg-light: rgba(15, 23, 42, 0.02);
      
      --glass-border-dark: rgba(255, 255, 255, 0.08);
      --glass-border-light: rgba(15, 23, 42, 0.08);
      
      --text-primary-dark: #f8fafc;
      --text-primary-light: #0f172a;
      
      --text-secondary-dark: #94a3b8;
      --text-secondary-light: #475569;
      
      --font-classic: 'Playfair Display', serif;
      --font-modern: 'Plus Jakarta Sans', sans-serif;
      --font-bangla: 'Hind Siliguri', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: var(--font-modern);
      transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1), 
                  border-color 0.5s cubic-bezier(0.4, 0, 0.2, 1), 
                  color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-primary-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      padding-bottom: 90px; /* Space for Mobile Bottom Nav */
      position: relative;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: 
        radial-gradient(circle at 10% 20%, rgba(115, 110, 254, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(236, 72, 153, 0.08) 0%, transparent 40%);
      pointer-events: none;
      z-index: -1;
      animation: drift 15s ease infinite alternate;
    }

    body.light-mode {
      background-color: var(--bg-light);
      color: var(--text-primary-light);
    }

    body.light-mode::before {
      background: 
        radial-gradient(circle at 10% 20%, rgba(115, 110, 254, 0.05) 0%, transparent 45%),
        radial-gradient(circle at 90% 80%, rgba(236, 72, 153, 0.03) 0%, transparent 45%);
    }

    @keyframes drift {
      0% { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.1) translate(1%, 1%); }
    }

    /* Global Loader */
    .global-loader {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #03001e;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    body.light-mode .global-loader {
      background: #f5f7fb;
    }
    
    .spinner-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .spinner-classic {
      position: relative;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--accent-primary);
      animation: spinClassic 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }

    .spinner-classic::before {
      content: '';
      position: absolute;
      top: 4px; left: 4px; right: 4px; bottom: 4px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--accent-tertiary);
      animation: spinClassic 1.8s linear infinite reverse;
    }

    @keyframes spinClassic {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Navigation Bar */
    .navbar {
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      background: rgba(3, 0, 30, 0.6);
      border-bottom: 1px solid var(--glass-border-dark);
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 1.25rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    body.light-mode .navbar {
      background: rgba(245, 247, 251, 0.6);
      border-bottom: 1px solid var(--glass-border-light);
    }

    .nav-logo {
      font-family: var(--font-classic);
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-decoration: none;
      background: linear-gradient(135deg, #736efe 0%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }

    .control-icon {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text-primary-dark);
      padding: 0.65rem;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      text-decoration: none;
    }
    body.light-mode .control-icon {
      background: rgba(15, 23, 42, 0.02);
      border-color: rgba(15, 23, 42, 0.08);
      color: var(--text-primary-light);
    }
    .control-icon:hover {
      transform: scale(1.1) rotate(15deg);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
    }

    /* Layout Wrapper */
    .feed-container {
      max-width: 1200px;
      margin: 3rem auto;
      padding: 0 2rem;
      display: flex;
      flex-direction: column;
      gap: 4rem;
    }

    /* Section Headers */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .section-title {
      font-family: var(--font-classic);
      font-size: 1.75rem;
      font-weight: 700;
      position: relative;
    }

    .section-title::after {
      content: '';
      position: absolute;
      bottom: -8px; left: 0;
      width: 40px; height: 3px;
      background: var(--accent-primary);
      border-radius: 2px;
    }

    .see-all {
      font-size: 0.9rem;
      color: var(--accent-primary);
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.3s ease;
    }
    .see-all:hover {
      color: var(--accent-secondary);
    }

    /* Category Filter Badges */
    .category-scroll {
      display: flex;
      gap: 0.75rem;
      overflow-x: auto;
      padding-bottom: 0.75rem;
      margin-bottom: 1rem;
      scrollbar-width: none;
    }
    .category-scroll::-webkit-scrollbar {
      display: none;
    }

    .category-badge {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--glass-border-dark);
      color: var(--text-primary-dark);
      padding: 0.6rem 1.4rem;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    body.light-mode .category-badge {
      background: rgba(15, 23, 42, 0.02);
      border-color: var(--glass-border-light);
      color: var(--text-primary-light);
    }
    .category-badge.active, .category-badge:hover {
      background: var(--accent-primary);
      border-color: var(--accent-primary);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(115, 110, 254, 0.25);
    }

    /* Grid Layouts */
    .story-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 2rem;
    }

    .story-card {
      display: flex;
      flex-direction: column;
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid var(--glass-border-dark);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    body.light-mode .story-card {
      background: rgba(15, 23, 42, 0.01);
      border-color: var(--glass-border-light);
    }
    .story-card:hover {
      transform: translateY(-6px);
      border-color: rgba(115, 110, 254, 0.3);
      box-shadow: 0 15px 30px rgba(0,0,0,0.3);
    }
    body.light-mode .story-card:hover {
      box-shadow: 0 15px 30px rgba(0,0,0,0.04);
    }

    .story-cover {
      height: 200px;
      background-size: cover;
      background-position: center;
      position: relative;
    }

    .story-lang-badge {
      position: absolute;
      top: 15px; left: 15px;
      background: rgba(3, 0, 30, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .story-info {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      gap: 0.75rem;
    }

    .story-title {
      font-family: var(--font-classic);
      font-size: 1.25rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-primary-dark);
    }
    body.light-mode .story-title {
      color: var(--text-primary-light);
    }

    .story-author {
      font-size: 0.85rem;
      color: var(--text-secondary-dark);
    }
    body.light-mode .story-author {
      color: var(--text-secondary-light);
    }

    .story-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      margin-top: auto;
      padding-top: 1rem;
      border-top: 1px solid var(--glass-border-dark);
      color: var(--text-secondary-dark);
    }
    body.light-mode .story-meta {
      border-color: var(--glass-border-light);
      color: var(--text-secondary-light);
    }

    .btn-read {
      margin-top: 0.75rem;
      width: 100%;
      padding: 0.75rem;
      border-radius: 30px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-align: center;
      text-decoration: none;
      background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
      color: white;
      font-size: 0.85rem;
      border: none;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .btn-read:hover {
      box-shadow: 0 4px 15px rgba(115, 110, 254, 0.3);
      transform: translateY(-1px);
    }

    /* Top Writers horizontal list */
    .writers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 2rem;
    }

    .writer-card {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding: 1.25rem;
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid var(--glass-border-dark);
      border-radius: 18px;
      text-decoration: none;
      color: inherit;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    body.light-mode .writer-card {
      background: rgba(15, 23, 42, 0.01);
      border-color: var(--glass-border-light);
    }
    .writer-card:hover {
      transform: translateY(-4px);
      border-color: rgba(115, 110, 254, 0.2);
      background: rgba(255, 255, 255, 0.03);
    }
    .writer-avatar {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      background: #334155;
      background-size: cover;
      background-position: center;
      border: 2px solid var(--glass-border-dark);
    }
    .writer-card:hover .writer-avatar {
      border-color: var(--accent-primary);
    }
    .writer-details {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .writer-name {
      font-weight: 600;
      font-size: 1rem;
      color: var(--text-primary-dark);
    }
    body.light-mode .writer-name {
      color: var(--text-primary-light);
    }
    .writer-sub {
      font-size: 0.8rem;
      color: var(--text-secondary-dark);
    }
    body.light-mode .writer-sub {
      color: var(--text-secondary-light);
    }

    /* Shimmer Skeleton Loaders */
    .skeleton-card {
      height: 340px;
      background: linear-gradient(90deg, rgba(255,255,255,0.01) 25%, rgba(255,255,255,0.04) 50%, rgba(255,255,255,0.01) 75%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.6s infinite;
      border-radius: 18px;
      border: 1px solid var(--glass-border-dark);
    }
    body.light-mode .skeleton-card {
      background: linear-gradient(90deg, rgba(0,0,0,0.01) 25%, rgba(0,0,0,0.03) 50%, rgba(0,0,0,0.01) 75%);
    }
    @keyframes skeleton-shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Mobile Bottom Navigation Bar (Fixed) */
    .mobile-nav {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%; height: 75px;
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      background: rgba(3, 0, 30, 0.8);
      border-top: 1px solid var(--glass-border-dark);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 999;
      box-shadow: 0 -4px 30px rgba(0,0,0,0.3);
    }
    body.light-mode .mobile-nav {
      background: rgba(248, 250, 252, 0.8);
      border-top-color: var(--glass-border-light);
      box-shadow: 0 -4px 30px rgba(0,0,0,0.02);
    }

    .mobile-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: var(--text-secondary-dark);
      font-size: 0.75rem;
      font-weight: 600;
      gap: 0.35rem;
      transition: color 0.3s ease;
    }
    body.light-mode .mobile-nav-item {
      color: var(--text-secondary-light);
    }

    .mobile-nav-item.active {
      color: var(--accent-primary);
    }

    .mobile-nav-icon {
      font-size: 1.35rem;
    }
  </style>
</head>
<body>

  <!-- Loading Animation Overlay -->
  <div class="global-loader" id="loader">
    <div class="spinner-box">
      <div class="spinner-classic"></div>
      <div class="loader-logo">StoryVerse</div>

      </div>
      <div class="story-grid" id="latest-grid">

  </main>

    <a href="explore.html" class="mobile-nav-item">

  <!-- Firebase Setup modules -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, query, orderByChild, equalTo, limitToLast, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Active client configurations
    const firebaseConfig = {
      apiKey: "AIzaSyAbPWMaCVnM5lXfoMtW1fZ9LZBH_68pxC0",
      authDomain: "novel-4d99f.firebaseapp.com",
      databaseURL: "https://novel-4d99f-default-rtdb.firebaseio.com",
      projectId: "novel-4d99f",
      storageBucket: "novel-4d99f.firebasestorage.app",
      messagingSenderId: "1005421601486",
      appId: "1:1005421601486:web:53865833ac47cc3567669f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const translations = {
      EN: {
        badgeAll: "All Stories",
        secTrending: "Trending Stories",
        secRecommended: "Recommended For You",
        secLatest: "Latest Releases",
        secWriters: "Top Authors",
        seeAll: "See All",
        navHome: "Home",
        navExplore: "Explore",
        navLibrary: "Library",
        navWallet: "Wallet",
        navProfile: "Profile",
        views: "Views",
        likes: "Likes",
        followers: "Followers",
        read: "Read"
      },
      BN: {
        badgeAll: "সব গল্প",
        secTrending: "জনপ্রিয় গল্পসমূহ",
        secRecommended: "আপনার জন্য প্রস্তাবিত",
        secLatest: "নতুন প্রকাশিত গল্প",
        secWriters: "সেরা লেখকগণ",
        seeAll: "সব দেখুন",
        navHome: "হোম",
        navExplore: "অন্বেষণ",
        navLibrary: "লাইব্রেরি",
        navWallet: "ওয়ালেট",
        navProfile: "প্রোফাইল",
        views: "ভ্যাকুয়াম",
        likes: "পছন্দ",
        followers: "অনুসারী",
        read: "পড়ুন"
      }
    };

    let currentLang = localStorage.getItem("lang") || "EN";
    let currentTheme = localStorage.getItem("theme") || "dark";

    const loader = document.getElementById("loader");
    const themeBtn = document.getElementById("btn-theme");
    const langBtn = document.getElementById("btn-lang");

    applyTheme(currentTheme);
    applyLanguage(currentLang);

    // Secure checking redirects
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "login.html";
      } else {
        fetchFeedData();
      }
    });

    window.addEventListener("load", () => {
      setTimeout(() => {
        loader.style.opacity = "0";
        setTimeout(() => loader.style.display = "none", 800);
      }, 500);
    });

    themeBtn.addEventListener("click", () => {
      currentTheme = currentTheme === "dark" ? "light" : "dark";
      applyTheme(currentTheme);
    });

    function applyTheme(theme) {
      if (theme === "light") {
        document.body.classList.add("light-mode");
        themeBtn.textContent = "☀️";
      } else {
        document.body.classList.remove("light-mode");
        themeBtn.textContent = "🌙";
      }
      localStorage.setItem("theme", theme);
    }

    langBtn.addEventListener("click", () => {
      currentLang = currentLang === "EN" ? "BN" : "EN";
      applyLanguage(currentLang);
      fetchFeedData();
    });

    function applyLanguage(lang) {
      const data = translations[lang];
      langBtn.textContent = lang;

      document.getElementById("badge-all").textContent = data.badgeAll;
      document.getElementById("sec-trending").textContent = data.secTrending;
      document.getElementById("sec-recommended").textContent = data.secRecommended;
      document.getElementById("sec-latest").textContent = data.secLatest;
      document.getElementById("sec-writers").textContent = data.secWriters;

      document.querySelectorAll(".see-all").forEach(elem => {
        elem.textContent = data.seeAll;
      });

      document.getElementById("nav-home").textContent = data.navHome;
      document.getElementById("nav-explore").textContent = data.navExplore;
      document.getElementById("nav-library").textContent = data.navLibrary;
      document.getElementById("nav-wallet").textContent = data.navWallet;
      document.getElementById("nav-profile").textContent = data.navProfile;

      localStorage.setItem("lang", lang);
    }

    // Connect and Filter feed items from RTDB
    async function fetchFeedData() {
      const dataLang = translations[currentLang];

      try {
        const storiesRef = ref(db, 'stories');
        const usersRef = ref(db, 'users');

        const [storiesSnap, usersSnap] = await Promise.all([
          get(query(storiesRef, orderByChild('status'), equalTo('approved'))),
          get(query(usersRef, orderByChild('writer'), equalTo(true)))
        ]);

        let stories = [];
        if (storiesSnap.exists()) {
          storiesSnap.forEach(child => {
            stories.push({ id: child.key, ...child.val() });
          });
        }

        if (stories.length > 0) {
          const trendingList = [...stories].sort((a, b) => (b.views || 0) - (a.views || 0)).slice(0, 4);
          renderStoriesGrid(trendingList, "trending-grid", dataLang);

          const recommendedList = [...stories].sort(() => 0.5 - Math.random()).slice(0, 4);
          renderStoriesGrid(recommendedList, "recommended-grid", dataLang);

          const latestList = [...stories].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)).slice(0, 4);
          renderStoriesGrid(latestList, "latest-grid", dataLang);
        } else {
          renderPlaceholderStories("trending-grid", dataLang);
          renderPlaceholderStories("recommended-grid", dataLang);
          renderPlaceholderStories("latest-grid", dataLang);
        }

        if (usersSnap.exists()) {
          let writers = [];
          usersSnap.forEach(child => {
            writers.push({ uid: child.key, ...child.val() });
          });
          writers.sort((a, b) => (b.followers || 0) - (a.followers || 0));
          renderWritersGrid(writers.slice(0, 4), "writers-grid", dataLang);
        } else {
          renderPlaceholderWriters("writers-grid", dataLang);
        }

      } catch (err) {
        console.warn("RTDB initialization state pending. Loading simulation.", err);
        renderPlaceholderStories("trending-grid", dataLang);
        renderPlaceholderStories("recommended-grid", dataLang);
        renderPlaceholderStories("latest-grid", dataLang);
        renderPlaceholderWriters("writers-grid", dataLang);
      }
    }

    function renderStoriesGrid(list, elementId, lang) {
      const grid = document.getElementById(elementId);
      if (list.length === 0) {
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary-dark);">No stories available</div>`;
        return;
      }

      grid.innerHTML = list.map(story => `
        <article class="story-card">
          <div class="story-cover" style="background-image: url('${story.cover || 'https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=600'}');">
            <span class="story-lang-badge">${story.language === 'Bangla' ? 'বাংলা' : 'EN'}</span>
          </div>
          <div class="story-info">
            <h3 class="story-title" title="${story.title}">${story.title}</h3>
            <p class="story-author">By ${story.authorName}</p>
            <div class="story-meta">
              <span>👀 ${story.views || 0} ${lang.views}</span>
              <span>❤️ ${story.likes || 0} ${lang.likes}</span>
            </div>
            <a href="story.html?id=${story.id}" class="btn-read">
              ${lang.read}
            </a>
          </div>
        </article>
      `).join('');
    }

    function renderWritersGrid(list, elementId, lang) {
      const grid = document.getElementById(elementId);
      grid.innerHTML = list.map(writer => `
        <a href="writer-profile.html?uid=${writer.uid}" class="writer-card">
          <div class="writer-avatar" style="background-image: url('${writer.profileImage || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?q=80&w=200'}')"></div>
          <div class="writer-details">
            <span class="writer-name">${writer.name || writer.username}</span>
            <span class="writer-sub">${writer.followers || 0} ${lang.followers} • Lvl ${writer.level || 1}</span>
          </div>
        </a>
      `).join('');
    }

    function renderPlaceholderStories(elementId, lang) {
      const targetElement = document.getElementById(elementId);
      const defaults = [
        { id: "p1", title: "Chronicles of the Spark", authorName: "Lidya Vance", cover: "https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=600", language: "English", views: 1800, likes: 450 },
        { id: "p2", title: "রূপকথার অন্তরালে", authorName: "Kazi Nazrul", cover: "https://images.unsplash.com/photo-1474932430478-367db2683dac?q=80&w=600", language: "Bangla", views: 2500, likes: 620 },
        { id: "p3", title: "Shadow of the Moon", authorName: "Michael Croft", cover: "https://images.unsplash.com/photo-1509021436665-8f07dbf5bf1d?q=80&w=600", language: "English", views: 920, likes: 180 },
        { id: "p4", title: "অনন্ত নক্ষত্র বীথি", authorName: "Humayun Ahmed", cover: "https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=600", language: "Bangla", views: 3400, likes: 1100 }
      ];
      renderStoriesGrid(defaults, elementId, lang);
    }

    function renderPlaceholderWriters(elementId, lang) {
      const targetElement = document.getElementById(elementId);
      const defaults = [
        { uid: "w1", name: "Humayun Ahmed", followers: 5800, level: 12, profileImage: "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?q=80&w=200" },
        { uid: "w2", name: "Lidya Vance", followers: 1420, level: 7, profileImage: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=200" },
        { uid: "w3", name: "Kazi Nazrul", followers: 4500, level: 10, profileImage: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=200" }
      ];
      renderWritersGrid(defaults, elementId, lang);
    }
  </script>
